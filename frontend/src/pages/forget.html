<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forget Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-box {
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px #667eea;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .back-link {
            margin-top: 15px;
            display: block;
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Reset Password</h2>

        <form id="forgetForm">
            <div class="input-box">
                <input type="text" id="forget-name" placeholder="Enter your name" required>
            </div>

            <div class="input-box">
                <input type="email" id="forget-email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <input type="password" id="new-password" placeholder="Enter new password" required>
            </div>

            <button type="submit">Reset Password</button>
        </form>

        <a href="index.html" class="back-link">Back to Login</a>
    </div>

    <script src="forget.js"></script>

</body>
</html>
