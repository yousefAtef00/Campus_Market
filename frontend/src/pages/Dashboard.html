<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAPSTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styleDashboard.css">
</head>
<div id="productModal" class="modal">
    <div class="modal-content">
        <h3>Add Product</h3>

        <input type="text" id="productName" placeholder="Product Name" required>
        
        <textarea id="productDesc" placeholder="Product Description" required></textarea>
        
        <input type="number" id="productPrice" placeholder="Product Price" required min="1">
        
        <input type="file" id="productImage" accept="image/*" required>

        <button class="btn" onclick="saveProduct()">Save</button>
        <button class="btn reject-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<body>
    <h2 id="welcome"></h2>
   <style>
#welcome{
    font-size: 24px;
    color: #333;
    margin: 0 auto;
    text-align: center;
}
</style>

    <div class="sidebar">
        <div class="logo-content">
            <div class="logo">
                <i class='bx bxs-landmark'></i>
             <h1>SWAPSTER</h1>
            </div>
            <i class='bx bx-menu' id="btn"></i>
        </div>

        <ul class="list">
            <li class="list-item active">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Search...">
            </li>
            <li class="list-item">
                <a href="#" onclick="loadPage('dashboard')">
                    <i class='bx bxs-dashboard'></i>
                    <span class="links-name">Dashboard</span>
                </a>
            </li>
            <li class="list-item">
                <a href="#" onclick="loadPage('products')">
                    <i class='bx bxs-shopping-bag-alt'></i>
                    <span class="links-name">Products</span>
                </a>
            </li>
            <li class="list-item">
                <a href="#" onclick="loadPage('orders')">
                    <i class='bx bxs-cart-alt'></i>
                    <span class="links-name">Orders</span>
                </a>
            </li>
            <li class="list-item">
                <a href="#" onclick="loadPage('messages')">
                    <i class='bx bxs-message-alt'></i>
                    <span class="links-name">Messages</span>
                </a>
            </li>
            <li class="list-item">
                <a href="#" onclick="loadPage('settings')">
                    <i class='bx bxs-cog'></i>
                    <span class="links-name">Settings</span>
                </a>
            </li>
        </ul>

        <ul class="list-logout">
            <li>
                <a href="index.html">
                    <i class='bx bxs-log-out'></i>
                    <span class="links-name">Logout</span>
                </a>
            </li>
        </ul>

    </div> 
<div class="content">
    <h2 id="page-title"></h2>
    <div id="page-buttons"></div>
</div>
    <script src="scriptDashboard.js"></script>

</body>
</html>
